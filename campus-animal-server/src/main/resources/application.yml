server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_animal?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: meiyoumima
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true  # 驼峰转换：real_name → realName
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印 SQL（学习用）
  global-config:
    db-config:
      id-type: auto  # 主键自增

# 文件上传本地存储路径
file:
  upload-dir: ./uploads

# JWT 配置
jwt:
  secret: Y2FtcHVzLWFuaW1hbC1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tMjAyNA==
  expiration: 86400000  # 24小时，单位毫秒

# Knife4j 文档
springdoc:
  swagger-ui:
    path: /swagger-ui.html
knife4j:
  enable: true
  setting:
    language: zh_cn
